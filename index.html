<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our online Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="courses">
      <img
        class="courses__bg courses__bg--dots"
        src="assets/background/background-first.png"
        alt=""
        aria-hidden="true"
      />
      <img
        class="courses__bg courses__bg--crescents"
        src="assets/background/background-second.png"
        alt=""
        aria-hidden="true"
      />
      <img
        class="courses__bg courses__bg--corners"
        src="assets/background/background-third.png"
        alt=""
        aria-hidden="true"
      />

      <header class="courses__header">
        <div class="courses__header-inner">
          <span class="courses__eyebrow">ENJOY YOUR STUDYING!</span>
          <h1 class="courses__title">
            Our online <span class="courses__title-highlight">courses</span>
          </h1>
        </div>
      </header>

      <div class="courses__controls">
        <nav class="courses__filters" aria-label="Filter by category">
          <button
            class="courses__filter courses__filter--active"
            data-category="all"
          >
            All <sup>47</sup>
          </button>
          <button class="courses__filter" data-category="Marketing">
            Marketing <sup>8</sup>
          </button>
          <button class="courses__filter" data-category="Management">
            Management <sup>12</sup>
          </button>
          <button class="courses__filter" data-category="HR &amp; Recruiting">
            HR &amp; Recruiting <sup>7</sup>
          </button>
          <button class="courses__filter" data-category="Design">
            Design <sup>9</sup>
          </button>
          <button class="courses__filter" data-category="Development">
            Development <sup>11</sup>
          </button>
        </nav>
        <label class="courses__search-wrap" for="search-input">
          <input
            type="search"
            id="search-input"
            class="courses__search"
            placeholder="Search courses..."
            autocomplete="off"
          />
          <svg
            class="courses__search-icon"
            viewBox="0 0 20 20"
            fill="none"
            aria-hidden="true"
          >
            <circle
              cx="8.5"
              cy="8.5"
              r="5.75"
              stroke="#9CA3AF"
              stroke-width="1.5"
            />
            <path
              d="M13.5 13.5L17.5 17.5"
              stroke="#9CA3AF"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </label>
      </div>

      <div
        class="courses__grid"
        id="courses-grid"
        aria-live="polite"
        aria-relevant="additions removals"
      ></div>

      <div class="courses__footer">
        <button class="courses__load-more" id="load-more-btn" type="button">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M2.09961 2C2.65189 2 3.09961 2.44772 3.09961 3V7.43632C4.75764 4.20928 8.11959 2 11.9996 2C16.3552 2 20.058 4.78413 21.4303 8.66675C21.6144 9.18747 21.3414 9.75879 20.8207 9.94284C20.3 10.1269 19.7287 9.85396 19.5446 9.33325C18.4459 6.22472 15.4813 4 11.9996 4C9.03957 4 6.45326 5.60799 5.06955 8H8.09957C8.65186 8 9.09957 8.44772 9.09957 9C9.09957 9.55228 8.65186 10 8.09957 10H2.09961C1.54732 10 1.09961 9.55228 1.09961 9V3C1.09961 2.44772 1.54732 2 2.09961 2Z"
              fill="#424551"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M3.17664 14.0572C3.69736 13.8731 4.26868 14.146 4.45273 14.6668C5.55144 17.7753 8.51608 20 11.9978 20C14.9578 20 17.5441 18.392 18.9278 16H15.8978C15.3455 16 14.8978 15.5523 14.8978 15C14.8978 14.4477 15.3455 14 15.8978 14H21.8977C22.45 14 22.8977 14.4477 22.8977 15V21C22.8977 21.5523 22.45 22 21.8977 22C21.3455 22 20.8977 21.5523 20.8977 21V16.5637C19.2397 19.7907 15.8778 22 11.9978 22C7.64215 22 3.93936 19.2159 2.56705 15.3332C2.383 14.8125 2.65593 14.2412 3.17664 14.0572Z"
              fill="#424551"
            />
          </svg>

          Load more
        </button>
      </div>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
